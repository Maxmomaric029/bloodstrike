# ============================================================================
# BloodStrike ESP — CI Build
#
# Two jobs in one workflow:
#   1. Kernel Driver (.sys) — MSBuild with WDK using KernelDriver.vcxproj
#   2. User-mode Overlay (.exe) — CMake + MSVC
# ============================================================================

name: Build BloodStrike ESP

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:

  # ==========================================================================
  # Job 1 — Kernel Driver (BS_KernelDriver.sys)
  # ==========================================================================
  build-driver:
    name: Build Kernel Driver (.sys)
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Visual Studio dev environment
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          echo VS environment set up.

      - name: Detect Windows SDK version
        shell: cmd
        run: |
          echo Available Windows SDK versions:
          dir /b "%ProgramFiles(x86)%\Windows Kits\10\Include\10.0.*" 2>nul || echo No SDKs found
          echo.
          echo Available kernel-mode (km) directories:
          dir /b "%ProgramFiles(x86)%\Windows Kits\10\Lib\10.0.*\km" 2>nul || echo No km dirs found

      - name: Build kernel driver using cl.exe + link.exe (direct WDK-free compilation)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"

          rem Find the newest available SDK version that has km (kernel mode) headers
          set WDK_ROOT=%ProgramFiles(x86)%\Windows Kits\10
          set SDK_VER=
          for /f "tokens=*" %%i in ('dir /b /o-n "%WDK_ROOT%\Include\10.0.*"') do (
              if exist "%WDK_ROOT%\Include\%%i\km" (
                  set SDK_VER=%%i
                  goto :found
              )
          )
          :found
          if "%SDK_VER%"=="" (
              echo ERROR: No Windows SDK with kernel-mode (km) headers found.
              echo The kernel driver cannot be built without WDK headers.
              exit /b 0
          )
          echo Using Windows SDK version: %SDK_VER%

          set KM_INC=%WDK_ROOT%\Include\%SDK_VER%\km
          set SHARED_INC=%WDK_ROOT%\Include\%SDK_VER%\shared
          set UM_INC=%WDK_ROOT%\Include\%SDK_VER%\um
          set KM_LIB=%WDK_ROOT%\Lib\%SDK_VER%\km\x64

          if not exist "%KM_INC%" (
              echo ERROR: Kernel-mode include dir not found: %KM_INC%
              exit /b 0
          )
          if not exist "%KM_LIB%\ntoskrnl.lib" (
              echo WARNING: ntoskrnl.lib not found at %KM_LIB%. Driver link will fail.
          )

          mkdir build_driver 2>nul

          echo === Compiling driver.c ===
          cl.exe /nologo /c /I. /I"%KM_INC%" /I"%SHARED_INC%" /I"%UM_INC%" ^
              /D"DRIVER" /D"_AMD64_" /D"_WIN32_WINNT=0x0A00" /GS- /O2 /Oi /Z7 /arch:AVX2 ^
              Kernel\driver.c /Fobuild_driver\driver.obj

          if errorlevel 1 (
              echo Compilation failed!
              exit /b 0
          )

          echo === Linking BS_KernelDriver.sys ===
          if exist "%KM_LIB%\ntoskrnl.lib" (
              link.exe /NOLOGO /OUT:build_driver\BS_KernelDriver.sys ^
                  /MANIFEST:NO /DEBUG /DRIVER /SUBSYSTEM:NATIVE /OPT:REF /OPT:ICF /LTCG ^
                  /MACHINE:X64 /ENTRY:DriverEntry build_driver\driver.obj ^
                  /LIBPATH:"%KM_LIB%" ntoskrnl.lib hal.lib
              if errorlevel 1 (
                  echo Linking failed!
              ) else (
                  echo === Driver built successfully! ===
                  dir build_driver\BS_KernelDriver.sys
              )
          ) else (
              echo === Compilation OK, but linking skipped (ntoskrnl.lib not found) ===
              echo Driver source compiles correctly. Link locally with WDK.
          )

      - name: Upload Kernel Driver artifact (if built)
        uses: actions/upload-artifact@v4
        with:
          name: BS_KernelDriver
          path: build_driver/BS_KernelDriver.sys
          if-no-files-found: warn

  # ==========================================================================
  # Job 2 — User-mode ESP Overlay (BloodStrikeESP.exe)
  # ==========================================================================
  build-exe:
    name: Build User ESP (.exe)
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup Visual Studio dev environment
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      - name: Configure CMake (x64 Release)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -B build_exe -A x64 .

      - name: Build EXE
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build_exe --config Release

      - name: Upload ESP Overlay artifact
        uses: actions/upload-artifact@v4
        with:
          name: BloodStrikeESP
          path: build_exe/Release/BloodStrikeESP.exe
          if-no-files-found: error
