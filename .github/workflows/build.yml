# ============================================================================
# BloodStrike ESP — CI Build
#
# Two jobs in one workflow:
#   1. Kernel Driver (.sys) — MSBuild with WDK using KernelDriver.vcxproj
#   2. User-mode Overlay (.exe) — CMake + MSVC
# ============================================================================

name: Build BloodStrike ESP

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:

  # ==========================================================================
  # Job 1 — Kernel Driver (BS_KernelDriver.sys)
  # ==========================================================================
  build-driver:
    name: Build Kernel Driver (.sys)
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      - name: Setup WDK
        uses: nuullll/setup-wdk@v1
        with:
          version: '10.0.22621.0'

      - name: Build kernel driver using MSBuild + vcxproj
        shell: cmd
        run: |
          msbuild Kernel\KernelDriver.vcxproj /p:Configuration=Release /p:Platform=x64 /p:OutDir=..\build_driver\ /t:Build /p:UseEnv=true

      - name: Upload Kernel Driver artifact
        uses: actions/upload-artifact@v4
        with:
          name: BS_KernelDriver
          path: build_driver/BS_KernelDriver.sys
          if-no-files-found: error

  # ==========================================================================
  # Job 2 — User-mode ESP Overlay (BloodStrikeESP.exe)
  # ==========================================================================
  build-exe:
    name: Build User ESP (.exe)
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup Visual Studio dev environment
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      - name: Configure CMake (x64 Release)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -B build_exe -A x64 .

      - name: Build EXE
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build_exe --config Release

      - name: Upload ESP Overlay artifact
        uses: actions/upload-artifact@v4
        with:
          name: BloodStrikeESP
          path: build_exe/Release/BloodStrikeESP.exe
          if-no-files-found: error
