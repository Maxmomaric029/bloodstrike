# ============================================================================
# BloodStrike ESP — CI Build
#
# Two jobs in one workflow:
#   1. Kernel Driver (.sys) — requires WDK (skips gracefully if unavailable)
#   2. User-mode Overlay (.exe) — CMake + MSVC
# ============================================================================

name: Build BloodStrike ESP

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:

  # ==========================================================================
  # Job 1 — Kernel Driver (BS_KernelDriver.sys)
  # GitHub Actions runners don't include the WDK, so this job checks if
  # kernel-mode headers/libs are available and builds only if they are.
  # For local builds, use Visual Studio with the WDK installed.
  # ==========================================================================
  build-driver:
    name: Build Kernel Driver (.sys)
    runs-on: windows-2022
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Attempt kernel driver build (WDK required)
        shell: cmd
        run: |
          set WDK_ROOT=%ProgramFiles(x86)%\Windows Kits\10
          set SDK_VER=
          for /f "tokens=*" %%i in ('dir /b /o-n "%WDK_ROOT%\Include\10.0.*" 2^>nul') do (
              if exist "%WDK_ROOT%\Include\%%i\km\ntddk.h" (
                  set SDK_VER=%%i
                  goto :build
              )
          )
          :build
          if "%SDK_VER%"=="" (
              echo WDK not available - skipping driver build.
              echo To build the driver locally, install the WDK and run:
              echo   msbuild Kernel\KernelDriver.vcxproj /p:Configuration=Release /p:Platform=x64
              exit /b 0
          )

          mkdir build_driver 2>nul

          set KM_INC=%WDK_ROOT%\Include\%SDK_VER%\km
          set SHARED_INC=%WDK_ROOT%\Include\%SDK_VER%\shared
          set UM_INC=%WDK_ROOT%\Include\%SDK_VER%\um
          set KM_LIB=%WDK_ROOT%\Lib\%SDK_VER%\km\x64

          echo Building driver with SDK %SDK_VER%...

          cl.exe /nologo /c /I. /I"%KM_INC%" /I"%SHARED_INC%" /I"%UM_INC%" ^
              /D"DRIVER" /D"_AMD64_" /D"_WIN32_WINNT=0x0A00" /GS- /O2 /Oi /arch:AVX2 ^
              Kernel\driver.c /Fobuild_driver\driver.obj

          if errorlevel 1 (
              echo Compilation failed.
              exit /b 0
          )
          echo Compilation OK.

          if exist "%KM_LIB%\ntoskrnl.lib" (
              link.exe /NOLOGO /OUT:build_driver\BS_KernelDriver.sys ^
                  /MANIFEST:NO /DRIVER /SUBSYSTEM:NATIVE /OPT:REF /OPT:ICF ^
                  /MACHINE:X64 /ENTRY:DriverEntry build_driver\driver.obj ^
                  /LIBPATH:"%KM_LIB%" ntoskrnl.lib hal.lib
              if not errorlevel 1 (
                  echo === Driver built successfully! ===
                  dir build_driver\BS_KernelDriver.sys
              )
          ) else (
              echo ntoskrnl.lib not found - linking skipped.
              echo Driver compiled OK. Link locally with WDK.
          )

      - name: Upload Kernel Driver artifact (if built)
        uses: actions/upload-artifact@v4
        with:
          name: BS_KernelDriver
          path: build_driver/BS_KernelDriver.sys
          if-no-files-found: warn

  # ==========================================================================
  # Job 2 — User-mode ESP Overlay (BloodStrikeESP.exe)
  # ==========================================================================
  build-exe:
    name: Build User ESP (.exe)
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup Visual Studio dev environment
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      - name: Configure CMake (x64 Release)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -B build_exe -A x64 .

      - name: Build EXE
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build_exe --config Release

      - name: Upload ESP Overlay artifact
        uses: actions/upload-artifact@v4
        with:
          name: BloodStrikeESP
          path: build_exe/Release/BloodStrikeESP.exe
          if-no-files-found: error
